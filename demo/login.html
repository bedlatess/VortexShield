<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VortexShield Secure Login Demo</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17211b;
        --muted: #66746b;
        --line: rgba(255, 255, 255, 0.42);
        --glass: rgba(255, 255, 255, 0.62);
        --green: #17a463;
        --green-2: #7be29a;
        --blue: #2f73dc;
        --red: #d94a3f;
        --shadow: 0 28px 80px rgba(28, 43, 36, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(123, 226, 154, 0.58), transparent 28%),
          radial-gradient(circle at 82% 12%, rgba(47, 115, 220, 0.32), transparent 26%),
          linear-gradient(135deg, #edf7ef 0%, #f7faf4 45%, #e9f2ff 100%);
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(23, 33, 27, 0.035) 1px, transparent 1px),
          linear-gradient(rgba(23, 33, 27, 0.03) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
      }

      .orb {
        position: fixed;
        border-radius: 999px;
        filter: blur(2px);
        opacity: 0.72;
        pointer-events: none;
      }

      .orb-a {
        width: 240px;
        height: 240px;
        left: -72px;
        bottom: 12%;
        background: rgba(23, 164, 99, 0.18);
      }

      .orb-b {
        width: 180px;
        height: 180px;
        right: 8%;
        bottom: -40px;
        background: rgba(47, 115, 220, 0.14);
      }

      main {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 34px;
        align-items: center;
        position: relative;
        z-index: 1;
      }

      .copy {
        padding: 24px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.52);
        border: 1px solid rgba(255, 255, 255, 0.56);
        color: #315242;
        font-size: 13px;
        font-weight: 700;
        backdrop-filter: blur(18px);
      }

      .eyebrow span {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 0 5px rgba(23, 164, 99, 0.12);
      }

      h1 {
        margin: 22px 0 12px;
        font-size: clamp(38px, 7vw, 70px);
        line-height: 0.94;
        letter-spacing: 0;
      }

      .lead {
        max-width: 560px;
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.75;
      }

      .login-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.46)),
          var(--glass);
        box-shadow: var(--shadow);
        backdrop-filter: blur(28px) saturate(1.18);
        padding: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 13px;
        display: grid;
        place-items: center;
        color: white;
        font-weight: 900;
        background:
          linear-gradient(135deg, var(--green), var(--blue));
        box-shadow: 0 14px 32px rgba(23, 164, 99, 0.24);
      }

      .brand strong {
        display: block;
        font-size: 18px;
      }

      .brand small {
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: #33443a;
        font-size: 13px;
        font-weight: 700;
      }

      input {
        width: 100%;
        border: 1px solid rgba(46, 70, 54, 0.14);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--ink);
        outline: none;
        padding: 13px 14px;
        font: inherit;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease,
          background 180ms ease;
      }

      input:focus {
        border-color: rgba(23, 164, 99, 0.58);
        background: rgba(255, 255, 255, 0.92);
        box-shadow:
          0 0 0 4px rgba(23, 164, 99, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

      #vsec-captcha-container {
        min-height: 106px;
        display: grid;
        place-items: center;
        padding: 2px 0;
      }

      .submit {
        height: 48px;
        border: 0;
        border-radius: 10px;
        cursor: pointer;
        color: white;
        font-weight: 850;
        font-size: 15px;
        background:
          linear-gradient(135deg, #15945b, #20bf73 52%, #2f73dc);
        box-shadow:
          0 18px 34px rgba(23, 164, 99, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.32);
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          filter 160ms ease;
      }

      .submit:hover {
        transform: translateY(-1px);
        filter: saturate(1.06);
        box-shadow:
          0 22px 40px rgba(23, 164, 99, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .submit:active {
        transform: translateY(0);
      }

      .notice {
        min-height: 22px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .notice.error {
        color: var(--red);
        font-weight: 800;
      }

      .login-card.shake {
        animation: shake 0.36s ease-in-out both;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        width: min(520px, calc(100vw - 32px));
        transform: translate(-50%, 22px);
        opacity: 0;
        pointer-events: none;
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 14px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 18px 54px rgba(28, 43, 36, 0.18);
        backdrop-filter: blur(22px);
        color: #24342a;
        transition:
          opacity 220ms ease,
          transform 220ms ease;
        z-index: 5;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .toast strong {
        display: block;
        margin-bottom: 4px;
        color: #117446;
      }

      .toast code {
        display: block;
        margin-top: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #305247;
        font-family: Consolas, monospace;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        18% { transform: translateX(-7px); }
        36% { transform: translateX(6px); }
        54% { transform: translateX(-4px); }
        72% { transform: translateX(2px); }
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
          gap: 14px;
        }

        .copy {
          padding: 4px;
        }

        h1 {
          margin-top: 16px;
        }

        .login-card {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>

    <main>
      <section class="copy" aria-label="VortexShield introduction">
        <div class="eyebrow"><span></span> VortexShield Adaptive Verification</div>
        <h1>Secure login, almost invisible.</h1>
        <p class="lead">
          低风险用户无感秒过，异常环境自动降级为复选框或滑块挑战。这个页面模拟真实业务登录流程，
          用最少的打扰换取高强度行为安全签名。
        </p>
      </section>

      <section class="login-card" id="login-card">
        <div class="brand">
          <div class="logo">VS</div>
          <div>
            <strong>VortexShield Console</strong>
            <small>Enterprise secure access</small>
          </div>
        </div>

        <form id="login-form" novalidate>
          <label>
            账号
            <input id="account" name="account" autocomplete="username" value="operator@vortex.local" />
          </label>

          <label>
            密码
            <input id="password" name="password" type="password" autocomplete="current-password" value="VortexShield#2026" />
          </label>

          <div id="vsec-captcha-container"></div>
          <input type="hidden" id="vsec_signature" name="vsec_signature" />

          <button class="submit" type="submit">登录</button>
          <div class="notice" id="notice">正在等待安全验证...</div>
        </form>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="../frontend/dist/vsec-sdk.js"></script>
    <script>
      const form = document.querySelector("#login-form");
      const card = document.querySelector("#login-card");
      const account = document.querySelector("#account");
      const notice = document.querySelector("#notice");
      const signatureInput = document.querySelector("#vsec_signature");
      const toast = document.querySelector("#toast");

      const sdk = new window.CaptchaSDK({
        container: "#vsec-captcha-container",
        apiBaseUrl: "http://127.0.0.1:48921",
        onSuccess(signature) {
          signatureInput.value = signature;
          notice.className = "notice";
          notice.textContent = "安全验证已完成，可以提交登录。";
        },
        onSilentPass(signature) {
          signatureInput.value = signature;
          notice.className = "notice";
          notice.textContent = "无感验证通过。";
        },
        onChallengeRequired(_challenge, response) {
          notice.className = "notice";
          notice.textContent = `需要完成 ${response.data.captcha_type} 验证。`;
        },
        onFailure(reason) {
          signatureInput.value = "";
          notice.className = "notice error";
          notice.textContent = `验证失败：${reason}`;
        },
        onError(error) {
          signatureInput.value = "";
          notice.className = "notice error";
          notice.textContent = error instanceof Error ? error.message : String(error);
        },
      });

      sdk.execute().catch(() => {});

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const signature = signatureInput.value.trim();
        if (!signature) {
          card.classList.remove("shake");
          void card.offsetWidth;
          card.classList.add("shake");
          notice.className = "notice error";
          notice.textContent = "请先完成安全验证";
          return;
        }

        showToast(
          "✅ 登录请求已拦截",
          `账号 ${account.value || "(empty)"} 已携带高防安全签名。`,
          signature,
        );
      });

      function showToast(title, message, signature) {
        toast.innerHTML = `
          <strong>${escapeHTML(title)}</strong>
          <span>${escapeHTML(message)}</span>
          <code>${escapeHTML(signature)}</code>
        `;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 4200);
      }

      function escapeHTML(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    </script>
  </body>
</html>
